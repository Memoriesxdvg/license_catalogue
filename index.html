<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoriesX Licenses</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card h2 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.price {
    font-size: 1.8rem;
    color: #00ffcc;
    margin: 10px 0;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00ccaa;
}

footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}

</style>
</head>

<body>

<header>
    <h1>MemoriesX License Store</h1>
    <p>Buy licenses for photographers & creators</p>
</header>

<div class="container">

    <div class="card">
        <h2>50</h2>
        <p>License Units</p>
        <div class="price">₹175</div>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>150</h2>
        <p>License Units</p>
        <div class="price">₹150</div>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>250</h2>
        <p>License Units</p>
        <div class="price">₹125</div>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>500</h2>
        <p>License Units</p>
        <div class="price">₹100</div>
        <button>Buy Now</button>
    </div>

</div>

<footer>
    © 2026 MemoriesX | Creative Licensing Platform
</footer>

</body>
</html>
